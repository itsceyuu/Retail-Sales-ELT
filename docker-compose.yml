# docker-compose.yml
# Retail-Sales-ELT — Deployment Lokal
#
# Arsitektur:
#   clickhouse  — Data Warehouse: Bronze, Silver, Gold
#   metabase    — Dashboard BI (http://localhost:3000)

services:
  # ───────────────────────────────────────────────────────
  # ClickHouse: Data Warehouse (Bronze / Silver / Gold)
  # HTTP interface : localhost:8123
  # Native interface: localhost:9000
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: retail_sales_clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: ${CH_USER}
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ───────────────────────────────────────────────────────
  # Metabase: Dashboard BI
  # Akses : http://localhost:3000
  # ───────────────────────────────────────────────────────
  metabase:
    image: metabase/metabase:v0.52.0
    container_name: retail_sales_metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      MB_DB_TYPE: h2 # Embedded H2
    volumes:
      - metabase_data:/metabase-data

# Volumes
volumes:
  clickhouse_data:
    name: retail_sales_clickhouse_data
  metabase_data:
    name: retail_sales_metabase_data

# Network
networks:
  default:
    name: retail_sales_network
